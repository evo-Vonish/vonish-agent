# === 字体规范 ===
fonts:
  chinese_body: "Microsoft YaHei"
  chinese_heading: "Microsoft YaHei"
  english_body: "Calibri"
  english_heading: "Calibri"
  fallback: "SimSun"

# === 字号层级（半磅单位） ===
font_sizes:
  cover_title: 72
  cover_subtitle: 24
  cover_meta: 20
  h1: 36
  h2: 28
  h3: 24
  body: 21
  caption: 20
  footer: 18

# === 间距规范（缇单位，1/20 pt） ===
spacing:
  h1_before: 600
  h1_after: 240
  h2_before: 400
  h2_after: 160
  paragraph: 160
  line_height: 360  # 1.5倍行距
  cover_spacing: 40  # 大标题字间距

# === CJK特殊规范 ===
cjk:
  body_first_line_indent: "480"  # 2字符
  heading_first_line_indent: "0"
  default_font_size: "21"  # 10.5pt

# === 封面风格 ===
cover_styles:
  - name: "morandi_curves"
    technique: "径向渐变 + 模糊椭圆 + 柔和曲线"
    mood: "温和、有机"
  - name: "ink_wash"
    technique: "SVG湍流滤镜 + 灰度"
    mood: "CJK文学、传统文化"
  - name: "swiss_grid"
    technique: "精确细线 + 几何块"
    mood: "专业报告、企业文档"
  - name: "geometric_blocks"
    technique: "重叠圆弧 + 透明度叠加"
    mood: "大胆几何风格"
  - name: "gradient_ribbons"
    technique: "柔和渐变椭圆 + 小点"
    mood: "优雅过渡效果"
  - name: "formal_double_border"
    technique: "嵌套边框 + 角装饰"
    mood: "传统正式文档"

# === 表格样式 ===
table_styles:
  academic_three_line:
    top_border_size: 12
    bottom_border_size: 12
    header_bottom_size: 4
    left_border: "Nil"
    right_border: "Nil"
    use_alt_rows: true
    alt_row_color: "F9F9F9"
    
  business:
    use_header_fill: true
    header_text_color: "FFFFFF"
    use_full_border: true
    border_size: 4
    use_alt_rows: true

# === 页面尺寸（A4） ===
page:
  width_twips: 11906
  height_twips: 16838
  width_emu: 7560000
  height_emu: 10692000
  margin_top: 1800
  margin_right: 1440
  margin_bottom: 1440
  margin_left: 1440
  margin_header: 720
  margin_footer: 720
