# === 字体规范 ===
fonts:
  body: "Georgia, 'Noto Serif', serif"
  body_size: "11pt"
  line_height: "1.7"
  heading: "Georgia, 'Noto Serif', serif"
  heading_color: "#2c3e50"
  code: "'Courier New', monospace"
  code_bg: "#f5f5f5"

# === 页面设置 ===
page:
  size: "A4"
  margin_top: "2.5cm"
  margin_bottom: "2.5cm"
  margin_left: "2cm"
  margin_right: "2cm"
  header_font_size: "9pt"
  footer_font_size: "9pt"

# === 封面风格 ===
cover_styles:
  minimal:
    description: "白色背景、居中排版、无装饰"
    css: "background: white; text-align: center;"
    use_for: "学术论文、正式课程"
    
  muji:
    description: "细边框 + 角方块 + 大量留白"
    css: "border: 1px solid #333; padding: 3cm;"
    use_for: "日式、极简生活"
    
  swiss_grid:
    description: "网格线 + 角块 + 强调条"
    css: "grid lines + corner blocks + accent bar"
    use_for: "专业报告、企业文档"
    
  soft_blocks:
    description: "柔和色矩形 + 透明度叠加"
    use_for: "温暖、教育、医疗"
    
  bauhaus:
    description: "散落几何形状(圆、三角、矩形)"
    use_for: "艺术、设计、创意"

# === 三线表规范 ===
table:
  top_border: "2px solid #2c3e50"
  bottom_border: "2px solid #2c3e50"
  header_bottom: "1px solid #2c3e50"
  header_bg: "#f8f7f5"
  cell_padding: "6pt 8pt"
  font_size: "10pt"

# === 禁止的UI组件 ===
forbidden_components:
  - name: "卡片组件(边框+标题栏)"
    replace_with: "三线表或纯段落"
  - name: "统计仪表板(数字卡网格)"
    replace_with: "表格展示数据"
  - name: "深色标题栏"
    replace_with: "粗体标题 + 细边框或左边框"
  - name: "时间线组件"
    replace_with: "编号列表或表格"
  - name: "深色代码块"
    replace_with: "浅灰背景 #f5f5f5"
  - name: "圆角边框"
    replace_with: "直角或无边框"

# === 编号系统 ===
numbering:
  method: "data-attributes"  # 禁止CSS Counter
  figure_prefix: "图 "
  table_prefix: "表 "
  equation_prefix: "("
  equation_suffix: ")"
